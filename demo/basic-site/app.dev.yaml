controllers:
  - basicsite.controllers:SiteController
  - skrift.controllers.auth:AuthController
  - skrift.admin.controller:AdminController
db:
  url: sqlite+aiosqlite:///./app.db
auth:
  redirect_base_url: http://localhost:8080
  methods:
    passkey:
      type: passkey
      label: Passkey
      factor_key: passkey
    dummy:
      type: dummy
      label: Demo Login
  second_factors:
    enabled: true
    challenge_on_enrolled: true
    methods:
      passkey:
        type: passkey
        label: Security Key
rate_limit:
  enabled: false
