environment: compose
controllers:
  - agentdemo.controllers:AgentDemoController
  - skrift.controllers.auth:AuthController
  - skrift.admin.controller:AdminController
db:
  url: $DATABASE_URL
  pool_pre_ping: true
redis:
  url: redis://redis:6379
auth:
  redirect_base_url: http://localhost:8083
  methods:
    dummy:
      type: dummy
      label: Demo Login
rate_limit:
  enabled: false
notifications:
  backend: skrift.lib.notification_backends:RedisBackend
workers:
  enabled: true
  preset: distributed
  queues:
    - agents
  concurrency: 2
  poll_interval: 0.1
  visibility_timeout: 60.0
  max_reclaims: 3
  imports:
    - agentdemo.agents
  persistence:
    streams:
      - workers:lifecycle
    batch_size: 100
    flush_interval: 1.0
    snapshot_prefixes:
      - "runstate:"
    snapshot_interval: 10.0
agents:
  default_queue: agents
  tool_call_queue: agents
  blob_backend: skrift.agents.blob:ArchiveBlobStore
  audit:
    large_value_threshold_bytes: 262144
