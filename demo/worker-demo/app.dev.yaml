controllers:
  - workerdemo.controllers:WorkerDemoController
  - skrift.controllers.auth:AuthController
  - skrift.admin.controller:AdminController
db:
  url: sqlite+aiosqlite:///./app.db
auth:
  redirect_base_url: http://localhost:8080
  methods:
    dummy:
      type: dummy
      label: Demo Login
rate_limit:
  enabled: false
workers:
  enabled: true
  execution: in_process
  queues:
    - demo-fast
    - demo-slow
    - demo-io
  concurrency: 4
  backends:
    state_store: skrift.workers.memory:InMemoryStateStore
    event_log: skrift.workers.memory:InMemoryEventLog
    queue: skrift.workers.memory:InMemoryQueue
    dead_letter_store: skrift.workers.memory:InMemoryDeadLetterStore
    archive: skrift.workers.memory:InMemoryArchive
